

<!DOCTYPE html>
<html>
<body>
<h2>🚀 WhatsApp Ultimate Sender</h2>

<h3>Excel</h3>
<input type="file" id="excel">
<button onclick="uploadExcel()">Upload Excel</button>

<h3>CSV</h3>
<input type="file" id="csv">
<button onclick="uploadCSV()">Upload CSV</button>

<h3>Google Sheet</h3>
<input id="gsheet">
<button onclick="loadSheet()">Load</button>

<h3>Manual Numbers</h3>
<textarea id="numbers"></textarea>

<h3>Message</h3>
<textarea id="msg">Hello {name}</textarea>

<h3>Settings</h3>
Delay Min <input id="dmin" value="8"><br>
Delay Max <input id="dmax" value="20"><br>
Batch <input id="batch" value="5"><br>
Cooldown Min <input id="cmin" value="60"><br>
Cooldown Max <input id="cmax" value="120"><br>

<button onclick="send()">Start</button>

<p id="status"></p>

<script>
function uploadExcel(){let f=new FormData();f.append("file",excel.files[0]);fetch('/upload_excel',{method:'POST',body:f});}
function uploadCSV(){let f=new FormData();f.append("file",csv.files[0]);fetch('/upload_csv',{method:'POST',body:f});}
function loadSheet(){fetch('/google_sheet',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({url:gsheet.value})});}

function send(){
fetch('/send',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({
numbers:numbers.value,message:msg.value,dmin:dmin.value,dmax:dmax.value,batch:batch.value,cmin:cmin.value,cmax:cmax.value})})}

setInterval(() => {
    fetch('/status')
    .then(res => res.json())
    .then(data => {
        document.getElementById('status').innerText =
            "Sent: " + data.sent +
            " | Failed: " + data.failed +
            " | Skipped: " + data.skipped +
            " | Running: " + data.running;
    });
}, 2000);
</script>
</body>
</html>
