
<!DOCTYPE html>
<html>
<body>
<h2>Hybrid WhatsApp Sender</h2>

<h3>Upload Excel</h3>
<input type="file" id="file">
<button onclick="upload()">Upload</button>

<h3>OR Enter Numbers (comma separated)</h3>
<textarea id="numbers"></textarea>

<h3>Message</h3>
<textarea id="msg">Hello {name} 🚀</textarea>

<button onclick="send()">Start</button>

<p id="status"></p>

<script>
function upload(){
 let f = new FormData();
 f.append("file", document.getElementById('file').files[0]);
 fetch('/upload',{method:'POST',body:f});
}

function send(){
 fetch('/send',{
  method:'POST',
  headers:{'Content-Type':'application/json'},
  body: JSON.stringify({
    message: document.getElementById('msg').value,
    numbers: document.getElementById('numbers').value
  })
 })
}

setInterval(()=>{
 fetch('/status').then(r=>r.json()).then(d=>{
  document.getElementById('status').innerText =
   `Sent:${d.sent} Failed:${d.failed} Skipped:${d.skipped}`
 })
},2000)
</script>
</body>
</html>
