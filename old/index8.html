

<!DOCTYPE html>
<html>
<body>
<h2>🚀 WhatsApp Pro MAX</h2>

<h3>Numbers</h3>
<textarea id="numbers"></textarea>

<h3>Message</h3>
<textarea id="msg">Hello {name}</textarea>

<h3>⚙️ Anti-Spam Settings</h3>
Delay Min: <input id="dmin" value="8"><br>
Delay Max: <input id="dmax" value="20"><br>
Batch Size: <input id="batch" value="5"><br>
Cooldown Min: <input id="cmin" value="60"><br>
Cooldown Max: <input id="cmax" value="120"><br>

<button onclick="send()">Start</button>

<p id="status"></p>

<script>
function send(){
 fetch('/send',{method:'POST',headers:{'Content-Type':'application/json'},
 body: JSON.stringify({
  numbers:numbers.value,
  message:msg.value,
  delay_min:dmin.value,
  delay_max:dmax.value,
  batch:batch.value,
  cool_min:cmin.value,
  cool_max:cmax.value
 })})
}

setInterval(()=>{
 fetch('/status').then(r=>r.json()).then(d=>{
  status.innerText=`Sent:${d.sent} Failed:${d.failed} Skipped:${d.skipped}`
 })
},2000)
</script>
</body>
</html>
