
<!DOCTYPE html>
<html>
<head>
    <title>WhatsApp Sender</title>
    <style>
        body { font-family: Arial; padding: 30px; }
        textarea { width: 100%; height: 150px; }
        button { padding: 10px 20px; }
    </style>
</head>
<body>
    <h2>🚀 WhatsApp Bulk Sender</h2>

    <textarea id="data">[
{"number":"916005852514","name":"Junaid"}
]</textarea><br><br>

    <button onclick="send()">Send Messages</button>

    <h3>Status:</h3>
    <p id="status">Idle</p>

    <script>
    function send(){
        fetch('/send',{
            method:'POST',
            headers:{'Content-Type':'application/json'},
            body:document.getElementById('data').value
        })
    }

    setInterval(()=>{
        fetch('/status')
        .then(res=>res.json())
        .then(data=>{
            document.getElementById('status').innerText = 
                `Sent: ${data.sent} | Failed: ${data.failed} | Running: ${data.running}`
        })
    },2000)
    </script>
</body>
</html>
