
"""
<!DOCTYPE html>
<html>
<body>
<h2>🚀 WhatsApp Hybrid Pro</h2>

<h3>Upload Excel</h3>
<input type="file" id="excel">
<button onclick="uploadExcel()">Upload Excel</button>

<h3>Upload CSV</h3>
<input type="file" id="csv">
<button onclick="uploadCSV()">Upload CSV</button>

<h3>Google Sheet URL</h3>
<input id="gsheet">
<button onclick="loadSheet()">Load Sheet</button>

<h3>Manual Numbers</h3>
<textarea id="numbers"></textarea>

<h3>Message</h3>
<textarea id="msg">Hello {name}</textarea>

<button onclick="send()">Start</button>

<p id="status"></p>

<script>
function uploadExcel(){
 let f=new FormData();
 f.append("file",document.getElementById('excel').files[0]);
 fetch('/upload_excel',{method:'POST',body:f});
}

function uploadCSV(){
 let f=new FormData();
 f.append("file",document.getElementById('csv').files[0]);
 fetch('/upload_csv',{method:'POST',body:f});
}

function loadSheet(){
 fetch('/google_sheet',{method:'POST',headers:{'Content-Type':'application/json'},
 body:JSON.stringify({url:document.getElementById('gsheet').value})})
}

function send(){
 fetch('/send',{method:'POST',headers:{'Content-Type':'application/json'},
 body:JSON.stringify({message:msg.value,numbers:numbers.value})})
}

setInterval(()=>{
 fetch('/status').then(r=>r.json()).then(d=>{
  status.innerText=`Sent:${d.sent} Failed:${d.failed} Skipped:${d.skipped}`
 })
},2000)
</script>
</body>
</html>
"""
